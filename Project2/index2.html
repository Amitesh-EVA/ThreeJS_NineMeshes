<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="control-panel">
        <h2>Shape Controls</h2>
        <label>Width</label>
        <input type="number" id="widthInput" value="10" min="1" />
   
        <label>Height</label>
        <input type="number" id="heightInput" value="10" min="1" />
   
        <label>Depth</label>
        <input type="number" id="depthInput" value="2" min="0.5" step="0.5"  />
   
        <label>Radius</label>
        <input type="number" id="radiusInput" min="0.5" step="0.1"  />
   
   
        <button id="updateBtn">Apply Changes</button>
      </div>
        <script type="module" src="./project2.js"></script>
</body>
</html>
